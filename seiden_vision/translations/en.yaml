configuration:
  log_level:
    name: Log level
    description: Controls log verbosity.
  provider:
    name: Vision adapter
    description: Use mock for local tests or aws_rekognition for real analysis.
  minimum_confidence:
    name: Minimum confidence
    description: Minimum confidence required to accept a detected face.
  duplicate_window_minutes:
    name: Duplicate window
    description: Minutes during which the same SHA-256 image is ignored.
  download_timeout_seconds:
    name: Download timeout
    description: Maximum time to download an image.
  maximum_image_size_mb:
    name: Maximum image size
    description: Size limit in MB. AWS Rekognition accepts up to 5 MB through Bytes.
  retain_images:
    name: Retain images
    description: Stores a local copy of analyzed images.
  history_retention_days:
    name: History retention
    description: Number of days to retain SQLite records.
  publish_to_home_assistant:
    name: Publish to Home Assistant
    description: Creates and updates REST state sensors.
  source_enabled:
    name: Watch Home Assistant source
    description: Automatically observes the configured entity.
  source_name:
    name: Source name
    description: Friendly name for the reader or camera.
  source_entity_id:
    name: Source entity
    description: Entity containing the photo URL.
  source_photo_attribute:
    name: Photo attribute
    description: Attribute containing the image URL.
  poll_interval_seconds:
    name: Poll interval
    description: Source entity polling frequency.
  aws_region:
    name: AWS Region
    description: Rekognition region, for example us-east-1.
  aws_access_key_id:
    name: AWS Access Key ID
    description: Access key for the dedicated Seiden Vision IAM user.
  aws_secret_access_key:
    name: AWS Secret Access Key
    description: Secret key for the dedicated IAM user. It is masked and never logged.
  aws_max_analyses_per_day:
    name: AWS daily limit
    description: Blocks new calls after this number of completed AWS analyses per day.
  aws_store_raw_response:
    name: Store raw AWS response
    description: Stores the full Rekognition JSON in SQLite for diagnostics.
  aws_connect_timeout_seconds:
    name: AWS connection timeout
    description: Maximum time to establish a connection to AWS.
  aws_read_timeout_seconds:
    name: AWS response timeout
    description: Maximum time to receive the Rekognition response.
  aws_max_attempts:
    name: AWS attempts
    description: Maximum attempts using the SDK standard retry mode.

  management_timezone:
    name: Fuso horário gerencial
  management_trend_days:
    name: Dias de tendência gerencial

  api_key:
    name: API key
    description: Protects mutating endpoints. Leave empty to rely only on Home Assistant ingress.
  webhook_enabled:
    name: Publish by webhook
    description: Sends the canonical event for each completed analysis to an external system such as Seiden FLOW.
  webhook_url:
    name: Webhook URL
    description: HTTP endpoint that receives vision.analysis_completed events.
  webhook_api_key:
    name: Webhook key
    description: Bearer token sent to the destination system.
  webhook_timeout_seconds:
    name: Webhook timeout
    description: Maximum time allowed for external event publishing.
